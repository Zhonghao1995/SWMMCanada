name: deploy-frontend

on:
  # Manual-only for now — the frontend is not deployed yet. Before running this,
  # enable Pages (Settings → Pages → Source = GitHub Actions) and set the
  # VITE_API_URL Actions variable to the backend URL. To auto-deploy on every
  # push to main, restore the push trigger:
  #   push:
  #     branches: [main]
  #     paths: ["frontend/**", ".github/workflows/deploy-frontend.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: /SWMMCanada/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
