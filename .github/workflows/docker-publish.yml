name: docker-publish

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is optional: it publishes a second copy whose PUBLIC pull count
      # GHCR doesn't expose. It kicks in only once DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
      # secrets exist; without them the job still publishes to GHCR exactly as before.
      - id: dockerhub
        name: Detect Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            images="ghcr.io/${{ github.repository }}"$'\n'"docker.io/$DOCKERHUB_USERNAME/swmmcanada"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            images="ghcr.io/${{ github.repository }}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
          { echo "images<<EOF"; echo "$images"; echo "EOF"; } >> "$GITHUB_OUTPUT"
      - if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
